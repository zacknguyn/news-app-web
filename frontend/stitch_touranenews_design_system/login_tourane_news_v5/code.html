<body class="bg-surface-container-lowest text-on-surface font-body-standard min-h-screen flex flex-col md:flex-row antialiased">
<!-- Left Column: Branding & Specs (40%) -->
<div class="w-full md:w-2/5 border-b md:border-b-0 md:border-r border-fog-hairline bg-paper-white flex flex-col justify-between p-padding-mobile md:p-padding-desktop">
<div>
<div class="font-display text-h2 text-primary font-bold tracking-tighter mb-12">
                TOURANE NEWS
            </div>
<h1 class="font-display text-display mb-8">
                Sign in to the newsroom
            </h1>
<div class="mb-12">
<img alt="Minimalist wireframe globe illustration representing global news coverage." class="w-full max-w-[280px] h-auto object-contain opacity-80 mix-blend-multiply" src="https://lh3.googleusercontent.com/aida/AP1WRLt_G2u2lGsQ2s8gFxIYfCaMQBvOy4PWLBHgnBN3E0sUcZbmvmVxuEnKgMPW__X6F7gplZpBrSYubpiPnZrknQCRA0t3WTv8XhtYSMgJGK08GU4M0qvaR2uJh08TwN1-CTghjenP0SdVLiWK9j08QUiE5VVyKmnJmWrL5yLhT_dDpnm71YcX-xqjStEKyUDd8hp63vTuyKiN7gDYivlua0IXPklwFAh0QkGCzgHc-SRn7iLSHJZpEmM0oA"/>
</div>
</div>
<!-- Spec Rows -->
<div class="flex flex-col gap-0 border-t border-fog-hairline pt-6">
<div class="flex justify-between items-center py-2 border-b border-fog-hairline">
<span class="font-micro-label text-micro-label text-secondary uppercase">Backend Status</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-approved-green"></span>
<span class="font-mono-metadata text-mono-metadata text-on-surface">Operational</span>
</div>
</div>
<div class="flex justify-between items-center py-2 border-b border-fog-hairline">
<span class="font-micro-label text-micro-label text-secondary uppercase">Access Model</span>
<span class="font-mono-metadata text-mono-metadata text-on-surface">Swiss-Grid Auth V2</span>
</div>
<div class="flex justify-between items-center py-2">
<span class="font-micro-label text-micro-label text-secondary uppercase">Current Role</span>
<span class="font-mono-metadata text-mono-metadata text-on-surface">Unauthenticated</span>
</div>
</div>
</div>
<!-- Right Column: Login Form (60%) -->
<div class="w-full md:w-3/5 flex flex-col justify-center items-center p-padding-mobile md:p-padding-desktop bg-surface-container-lowest">
<div class="w-full max-w-[400px]">
<form action="/dashboard" class="flex flex-col gap-6" method="POST">
<div class="flex flex-col gap-2">
<label class="font-micro-label text-micro-label text-secondary uppercase tracking-widest" for="email">Email Address</label>
<input class="w-full h-12 bg-transparent border border-carbon-ink/20 text-on-surface font-body-standard px-4 rounded-none focus:outline-none focus:border-signal-red focus:ring-1 focus:ring-signal-red/25 transition-colors" id="email" name="email" placeholder="name@touranenews.ch" required="" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-micro-label text-micro-label text-secondary uppercase tracking-widest" for="password">Password</label>
<a class="font-mono-metadata text-mono-metadata text-secondary hover:text-primary transition-colors underline" href="/forgot-password">Reset?</a>
</div>
<input class="w-full h-12 bg-transparent border border-carbon-ink/20 text-on-surface font-body-standard px-4 rounded-none focus:outline-none focus:border-signal-red focus:ring-1 focus:ring-signal-red/25 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full h-12 mt-4 bg-signal-red text-paper-white font-micro-label text-micro-label uppercase tracking-widest rounded-none hover:bg-primary transition-colors flex items-center justify-center gap-2 group" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-fog-hairline text-center">
<span class="font-body-standard text-body-standard text-secondary">No credentials?</span>
<a class="font-body-standard text-body-standard text-primary hover:underline ml-1 font-semibold" href="/register">Request access</a>
</div>
</div>
</div>
</body></html>
