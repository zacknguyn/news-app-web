<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom form overrides for flat minimal look */
        [type="radio"], [type="checkbox"] {
            appearance: none;
            background-color: transparent;
            margin: 0;
            border: 1px solid rgba(10, 10, 10, 0.2);
            border-radius: 0;
            width: 18px;
            height: 18px;
            display: grid;
            place-content: center;
        }
        [type="radio"]:checked, [type="checkbox"]:checked {
            border-color: #DC2626; /* Signal Red */
            background-color: transparent;
        }
        [type="radio"]::before {
            content: "";
            width: 10px;
            height: 10px;
            background-color: #DC2626;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #DC2626;
        }
        [type="checkbox"]::before {
            content: "";
            width: 10px;
            height: 10px;
            background-color: #DC2626;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        [type="radio"]:checked::before, [type="checkbox"]:checked::before {
            transform: scale(1);
        }
        [type="radio"]:focus, [type="checkbox"]:focus {
            outline: max(2px, 0.15em) solid rgba(220, 38, 38, 0.25);
            outline-offset: 2px;
        }
        body {
            background-color: #FAFAFA; /* paper-white */
            color: #1a1c1c; /* on-surface */
        }
    </style>
</head>
<body class="antialiased min-h-screen font-body-standard text-body-standard">
<!-- TopNavBar: Nav shell suppressed due to linear/transactional intent of settings page -->
<main class="max-w-max-width-container mx-auto px-padding-mobile md:px-padding-desktop py-12 md:py-16">
<div class="flex flex-col xl:flex-row gap-gap-section lg:gap-16">
<!-- Left Content Column (1fr) -->
<div class="flex-1 max-w-[720px]">
<header class="mb-12">
<span class="font-mono-metadata text-mono-metadata text-steel-subdued uppercase tracking-widest block mb-4">NEWSLETTER</span>
<h1 class="font-display text-display text-carbon-ink">Reading preferences</h1>
</header>
<form>
<!-- Frequency Section -->
<section class="mb-16">
<div class="border-t border-fog-hairline">
<!-- Daily Option -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input checked="" class="group-hover:border-slate-body transition-colors" name="frequency" type="radio" value="daily"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink mb-1">Daily briefing</span>
<span class="block font-mono-metadata text-mono-metadata text-steel-subdued">A concise summary of top stories delivered every morning at 6 AM.</span>
</div>
</label>
<!-- Weekly Option -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input class="group-hover:border-slate-body transition-colors" name="frequency" type="radio" value="weekly"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink mb-1">Weekly briefing</span>
<span class="block font-mono-metadata text-mono-metadata text-steel-subdued">A comprehensive review of the week's most important coverage, sent Sundays.</span>
</div>
</label>
<!-- No Digest Option -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input class="group-hover:border-slate-body transition-colors" name="frequency" type="radio" value="none"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink mb-1">No digest</span>
<span class="block font-mono-metadata text-mono-metadata text-steel-subdued">Do not send me summary emails. Important account alerts will still be sent.</span>
</div>
</label>
</div>
</section>
<!-- Theme Section -->
<section class="mb-16">
<span class="font-mono-metadata text-mono-metadata text-steel-subdued uppercase tracking-widest block mb-4">THEME</span>
<div class="border-t border-fog-hairline">
<!-- Light Theme -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input checked="" class="group-hover:border-slate-body transition-colors" name="theme" type="radio" value="light"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink">Light</span>
</div>
</label>
<!-- Dark Theme -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input class="group-hover:border-slate-body transition-colors" name="theme" type="radio" value="dark"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink">Dark</span>
</div>
</label>
<!-- System Theme -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input class="group-hover:border-slate-body transition-colors" name="theme" type="radio" value="system"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink">System</span>
</div>
</label>
</div>
</section>
<!-- Interface Toggles Section -->
<section class="mb-8">
<span class="font-mono-metadata text-mono-metadata text-steel-subdued uppercase tracking-widest block mb-4">INTERFACE</span>
<div class="border-t border-fog-hairline">
<!-- Verified First -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input checked="" class="group-hover:border-slate-body transition-colors" name="pref_verified" type="checkbox"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink">Show verified first</span>
</div>
</label>
<!-- Auto-expand Comments -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input class="group-hover:border-slate-body transition-colors" name="pref_comments" type="checkbox"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink">Auto-expand comments</span>
</div>
</label>
<!-- Compact Post Rows -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input class="group-hover:border-slate-body transition-colors" name="pref_compact" type="checkbox"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink">Compact post rows</span>
</div>
</label>
<!-- Show Channel Descriptions -->
<label class="flex items-start py-6 border-b border-fog-hairline cursor-pointer group hover:bg-surface-bright transition-colors">
<div class="mr-6 mt-1 flex-shrink-0">
<input checked="" class="group-hover:border-slate-body transition-colors" name="pref_channels" type="checkbox"/>
</div>
<div class="flex-1">
<span class="block font-h2 text-h2 text-carbon-ink">Show channel descriptions</span>
</div>
</label>
</div>
</section>
<div class="mt-8">
<button class="bg-carbon-ink text-paper-white font-micro-label text-micro-label px-6 py-3 hover:-translate-y-[0.5px] transition-transform" type="submit">
                            SAVE PREFERENCES
                        </button>
</div>
</form>
</div>
<!-- Right Sidebar (Contextual) -->
<aside class="w-full xl:w-rail-right shrink-0 mt-12 xl:mt-0">
<div class="xl:sticky xl:top-[64px]">
<div class="mb-12">
<a class="inline-flex items-center text-primary font-mono-metadata text-mono-metadata hover:underline group" href="/">
<span class="material-symbols-outlined text-[16px] mr-2 group-hover:-translate-x-1 transition-transform" data-icon="arrow_left">arrow_left</span>
                            Back to home
                        </a>
</div>
<div class="border-t border-fog-hairline pt-6">
<span class="font-mono-metadata text-mono-metadata text-steel-subdued uppercase tracking-widest block mb-4">ACCOUNT</span>
<p class="font-body-standard text-body-standard text-slate-body">
                            Your reading preferences are synced across all your devices when signed in. Updating these settings will affect your experience on desktop, tablet, and mobile applications immediately.
                        </p>
</div>
</div>
</aside>
</div>
</main>
</body></html>
