<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Tourane News - File a Report</title>

                        "on-tertiary-fixed-variant": "#004b71",
                        "on-surface": "#1a1c1c",

                        "secondary-container": "#e5e2e1",
                        "carbon-ink": "#0A0A0A",
                        "on-secondary-container": "#656464",
                        "on-primary-fixed-variant": "#93000b",
                        "surface-container-high": "#e8e8e8",
                        "paper-white": "#FAFAFA",
                        "on-surface-variant": "#5c403c",
                        "warn-amber": "#D97706",
                        "steel-subdued": "#71717A",
                        "tertiary-fixed": "#cbe6ff",
                        "on-primary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-secondary-fixed-variant": "#474646",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#2f3131",
                        "surface-container-low": "#f3f3f3",
                        "on-tertiary-container": "#f3f8ff",
                        "inverse-on-surface": "#f0f1f1",
                        "approved-green": "#16A34A",
                        "signal-red": "#DC2626",
                        "surface-bright": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "surface-lift": "#FFFFFF",

                    "borderRadius": {

                        "display-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "mono-metadata": ["12px", { "lineHeight": "1", "fontWeight": "400" }],
                        "micro-label": ["11px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],

<body class="bg-surface-container-lowest text-on-surface font-body-standard antialiased">
<!-- TopNavBar (Nav suppressed due to transactional nature of 'Submit' screen, keeping minimal header for context) -->
<header class="bg-surface-container-lowest fixed top-0 w-full z-50 border-b border-fog-hairline flat no shadows h-16 px-padding-desktop w-full mx-auto flex justify-between items-center max-w-max-width-container">
<div class="font-display text-display-mobile font-bold text-primary border-t-4 border-primary pt-1 uppercase tracking-tighter">
            Tourane News
        </div>
<div class="flex items-center space-x-4">
<a class="text-secondary hover:text-primary transition-colors duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</a>
</div>
</header>
<!-- Main Content Area -->
<main class="pt-24 pb-16 px-padding-mobile md:px-padding-desktop max-w-[900px] mx-auto w-full min-h-screen">
<!-- Header -->
<div class="mb-gap-section border-b border-fog-hairline pb-4">
<h1 class="font-display text-display">File a report</h1>
<p class="font-body-standard text-body-standard text-secondary mt-2">Submit your story to the editorial desk for review.</p>
</div>
<div class="flex flex-col md:flex-row gap-8">
<!-- Editor Column -->
<div class="flex-1 space-y-6">
<!-- Headline Input -->
<div class="space-y-2">
<label class="font-micro-label text-micro-label text-carbon-ink uppercase block" for="headline">Headline</label>
<input class="w-full bg-transparent border-0 border-b border-fog-hairline focus:border-signal-red focus:ring-0 p-0 py-2 font-display text-[28px] font-bold text-on-surface placeholder:text-surface-variant transition-colors rounded-none outline-none" id="headline" placeholder="Enter headline here..." type="text"/>
</div>
<!-- Rich Text Area -->
<div class="border border-fog-hairline rounded-none">
<!-- Mono Toolbar -->
<div class="bg-surface-container-lowest border-b border-fog-hairline p-2 flex items-center space-x-2 overflow-x-auto font-mono-metadata text-mono-metadata text-secondary">
<button class="p-1 hover:text-carbon-ink transition-colors"><span class="material-symbols-outlined text-[16px]">format_bold</span></button>
<button class="p-1 hover:text-carbon-ink transition-colors"><span class="material-symbols-outlined text-[16px]">format_italic</span></button>
<button class="p-1 hover:text-carbon-ink transition-colors"><span class="material-symbols-outlined text-[16px]">format_underlined</span></button>
<div class="w-px h-4 bg-fog-hairline mx-2"></div>
<button class="p-1 hover:text-carbon-ink transition-colors"><span class="material-symbols-outlined text-[16px]">format_list_bulleted</span></button>
<button class="p-1 hover:text-carbon-ink transition-colors"><span class="material-symbols-outlined text-[16px]">format_list_numbered</span></button>
<div class="w-px h-4 bg-fog-hairline mx-2"></div>
<button class="p-1 hover:text-carbon-ink transition-colors"><span class="material-symbols-outlined text-[16px]">link</span></button>
<button class="p-1 hover:text-carbon-ink transition-colors"><span class="material-symbols-outlined text-[16px]">image</span></button>
</div>
<!-- Editor Body -->
<textarea class="w-full bg-transparent border-0 focus:ring-0 p-4 font-body-article text-body-article text-on-surface placeholder:text-surface-variant resize-y outline-none rounded-none" id="body" placeholder="Write your report here..." rows="15"></textarea>
</div>
<!-- Topic Selection -->
<div class="space-y-2 border-t border-fog-hairline pt-6">
<label class="font-micro-label text-micro-label text-carbon-ink uppercase block" for="topic">Topic / Category</label>
<select class="w-full bg-transparent border border-fog-hairline focus:border-signal-red focus:ring-0 p-3 font-body-standard text-body-standard text-on-surface rounded-none outline-none appearance-none cursor-pointer" id="topic">
<option disabled="" selected="" value="">Select a primary topic</option>
<option value="politics">Politics</option>
<option value="economy">Economy</option>
<option value="technology">Technology</option>
<option value="world">World News</option>
</select>
</div>
</div>
<!-- Right Sidebar / Checklist -->
<div class="w-full md:w-64 shrink-0 space-y-6">
<div class="border border-fog-hairline p-4">
<h3 class="font-micro-label text-micro-label text-carbon-ink uppercase mb-4 border-b border-fog-hairline pb-2">Pre-flight Checklist</h3>
<ul class="space-y-3 font-mono-metadata text-mono-metadata text-secondary">
<li class="flex items-start space-x-2">
<span class="material-symbols-outlined text-[14px] text-surface-variant mt-0.5" id="check-headline">radio_button_unchecked</span>
<span>Headline ready</span>
</li>
<li class="flex items-start space-x-2">
<span class="material-symbols-outlined text-[14px] text-surface-variant mt-0.5" id="check-body">radio_button_unchecked</span>
<span>Body 80+ chars</span>
</li>
<li class="flex items-start space-x-2">
<span class="material-symbols-outlined text-[14px] text-surface-variant mt-0.5" id="check-topic">radio_button_unchecked</span>
<span>Topic selected</span>
</li>
</ul>
</div>
<button class="w-full bg-surface-container-high text-secondary border border-fog-hairline py-3 px-4 font-micro-label text-micro-label uppercase tracking-widest transition-all duration-150 rounded-none cursor-not-allowed" disabled="" id="publish-btn">
                    Publish Report
                </button>
<p class="font-mono-metadata text-mono-metadata text-steel-subdued text-center">Draft saved at <span id="save-time">10:42 AM</span></p>
</div>
</div>
</main>
<script>
        // Simple client-side validation for the checklist micro-interactions
        const headlineInput = document.getElementById('headline');
        const bodyInput = document.getElementById('body');
        const topicSelect = document.getElementById('topic');
        
        const checkHeadline = document.getElementById('check-headline');
        const checkBody = document.getElementById('check-body');
        const checkTopic = document.getElementById('check-topic');
        
        const publishBtn = document.getElementById('publish-btn');
        
        function updateChecklist() {
            let isHeadlineValid = headlineInput.value.trim().length > 5;
            let isBodyValid = bodyInput.value.trim().length > 80;
            let isTopicValid = topicSelect.value !== '';
            
            // Update icons and colors
            updateCheckItem(checkHeadline, isHeadlineValid);
            updateCheckItem(checkBody, isBodyValid);
            updateCheckItem(checkTopic, isTopicValid);
            
            // Enable/Disable publish button
            if (isHeadlineValid && isBodyValid && isTopicValid) {
                publishBtn.disabled = false;
                publishBtn.classList.remove('bg-surface-container-high', 'text-secondary', 'border-fog-hairline', 'cursor-not-allowed');
                publishBtn.classList.add('bg-signal-red', 'text-paper-white', 'border-signal-red', 'hover:-translate-y-[0.5px]', 'hover:bg-primary', 'cursor-pointer');
            } else {
                publishBtn.disabled = true;
                publishBtn.classList.add('bg-surface-container-high', 'text-secondary', 'border-fog-hairline', 'cursor-not-allowed');
                publishBtn.classList.remove('bg-signal-red', 'text-paper-white', 'border-signal-red', 'hover:-translate-y-[0.5px]', 'hover:bg-primary', 'cursor-pointer');
            }
        }
        
        function updateCheckItem(element, isValid) {
            if (isValid) {
                element.textContent = 'check_circle';
                element.classList.remove('text-surface-variant');
                element.classList.add('text-approved-green');
            } else {
                element.textContent = 'radio_button_unchecked';
                element.classList.add('text-surface-variant');
                element.classList.remove('text-approved-green');
            }
        }
        
        headlineInput.addEventListener('input', updateChecklist);
        bodyInput.addEventListener('input', updateChecklist);
        topicSelect.addEventListener('change', updateChecklist);
        
        // Initial check
        updateChecklist();
    </script>
</body></html>
